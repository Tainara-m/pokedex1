<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pokedex é um projeto de estudo que tem como objetivo criar uma aplicação web para exibir informações sobre os pokémons. O projeto utiliza a API do PokéAPI para obter dados sobre os pokémons, como suas características, habilidades e evoluções. A aplicação é desenvolvida utilizando HTML, CSS e JavaScript, e tem como objetivo proporcionar uma experiência interativa e informativa para os usuários interessados no universo dos pokémons.">
    <meta name="keywords" content="Pokedex, pokémon, pokéapi, aplicação web, estudo, HTML, CSS, JavaScript">
    <meta name="author" content="Tainara Martins">
    <meta name="robots" content="index, follow">
    <title>Pokedex</title>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/site.webmanifest">
    
    <!-- Fonte Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
 
    <!-- Estilização -->
    <link rel="stylesheet" href="assets/css/pokedex.css">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
    <main>
        <header>
            <img src="assets/logo.png" alt="Logo do meu projeto de Pokedex">
            <h1>Pokedex</h1>
        </header>
        <section class="search-section">
            <form class="search-form">
            <div class="search">
                <label for="search">Pesquisar Pokémon</label>
                <input type="search" name="search" id="search" placeholder="Informe o nome ou código do Pokemon">
                <button type="submit" class="btn-search" id="search-btn">Buscar</button>
            </div>
        </form>
        </section>
        <section class="card-container" id="card-container"></section>
        <div class="load-more-container">
    <button id="load-more-btn">Carregar mais</button>
    <button id="reset-list-btn" class="reset-list-btn">Reiniciar lista</button>
    <button id="back-to-top" class="back-to-top hidden">Voltar ao topo</button>
</div>
    </main>
    <div id="pokemon-modal" class="modal hidden">
    <div class="modal-content">
        <button id="close-modal" class="modal-close">✖</button>
        <div id="modal-card"></div>
    </div>
</div>
<script src="assets/js/script.js"></script>
</body>
</html>
